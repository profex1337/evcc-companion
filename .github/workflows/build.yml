name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Only a boolean is job-wide; the actual signing-secret VALUES are scoped
      # to the single "Configure release signing" step, so third-party actions
      # never have them in their environment.
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Require signing secret for tagged releases
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_KEYSTORE != 'true'
        run: |
          echo "::error::KEYSTORE_BASE64 is not set — refusing to publish an unsigned release."
          exit 1

      - name: Configure release signing
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Fat APK with both ARM ABIs (64- + 32-bit) so it installs on every real
      # phone — arm64-only would fail to install on armeabi-v7a devices. x86_64
      # (emulator-only) is left out to keep the size down.
      - name: Build release APK (arm64 + armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm64,android-arm

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evcc-pi-tool-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # Play Store wants an App Bundle (.aab). Built only when signing is
      # configured; kept as a CI artifact (NOT attached to the public release,
      # so friends only ever see the installable .apk).
      - name: Build release App Bundle (Play Store)
        if: env.HAS_KEYSTORE == 'true'
        run: flutter build appbundle --release

      - name: Upload Play Store AAB artifact
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: evcc-pi-tool-playstore-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_KEYSTORE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
